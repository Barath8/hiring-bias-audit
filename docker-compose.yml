version: "1.0"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
  
  airflow:
    build: ./airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    command: webserver

  airflow-scheduler:
    build: ./airflow
    depends_on:
      - airflow
    command: scheduler

  mlflow:
    build: ./mlflow
    ports:
      - "5000:5000"
  
  grafana:
    build: ./monitoring/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
